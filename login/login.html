<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
    <div class="loginBox">
        <!-- <h1>welcome to fork&fire</h1> -->
        <h1>log in</h1>
        <form action="" class="loginf" id="loginf">
            <div class="inBox">
                <i class="fa-solid fa-phone"></i>
                <input type="number" placeholder="phone number"  id="LoginNum">
                <small></small>
            </div>
            <div class="inBox">
                <i class="fa-solid fa-key"></i>
                <input type="password" placeholder="password"  id="loginPass">
                <small></small>
            </div>
            <button type="submit" class="loginB" id="loginB">log in</button>
            <p>don`t have an account? <a href="reg.html">register</a></p>
        </form>
    </div>
    <script src="login.js"></script>
</body>

</html>
