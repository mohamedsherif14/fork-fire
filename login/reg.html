<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="loginBox">
        <!-- <h1>welcome to fork&fire</h1> -->
        <h1>register</h1>
        <form action="" class="loginf" id="regf">
            <div class="inBox">
                <i class="fa-solid fa-address-card"></i>
                <input type="text" placeholder="full name"  id="regName">
                <small></small>
            </div>
            <div class="inBox">
                <i class="fa-solid fa-envelope"></i>
                <input type="text" placeholder="e-mail"  id="rege">
                <small></small>
            </div>
            <div class="inBox">
                <i class="fa-solid fa-phone"></i>
                <input type="number" placeholder="phone number"  id="regNum">
                <small></small>
            </div>
            <div class="inBox">
                <i class="fa-solid fa-key"></i>
                <input type="password" placeholder="password"  id="regPass1">
                <small></small>
            </div>
            <div class="inBox">
                <i class="fa-solid fa-key"></i>
                <input type="password" placeholder="conferm password"  id="regPass2">
                <small></small>
            </div>

            <button type="submit" class="loginB" id="regB">register</button>
            <p>do you have an account? <a href="login.html">sign in</a></p>
        </form>
    </div>
    <script src="reg.js"></script>
</body>

</html>
